name: Build Signed AAB (Nine Men's Morris)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.1)'
        required: true
        default: '1.0.0'
      deploy:
        description: 'Deploy to Play Console'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Decode keystore from secrets
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > ninemensmorris-upload-key.jks
          ls -lh ninemensmorris-upload-key.jks

      - name: Download last version code
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: last-version-code
          workflow: build-signed-aab.yml
          if_no_artifact_found: ignore

      - name: Generate date-based version code
        run: |
          DATE_PART=$(date +%y%m%d)
          echo "Current date: $DATE_PART"
          if [ -f version_code.txt ]; then
            LAST_VERSION=$(cat version_code.txt)
          else
            LAST_VERSION="0"
          fi
          echo "Last version code: $LAST_VERSION"
          if [ -z "$LAST_VERSION" ] || [ "$LAST_VERSION" == "0" ]; then
            NEW_VERSION_CODE="${DATE_PART}01"
            echo "::notice::First build - initializing to $NEW_VERSION_CODE"
          else
            LAST_DATE_PART="${LAST_VERSION:0:6}"
            if [ "$DATE_PART" == "$LAST_DATE_PART" ]; then
              LAST_COUNTER="${LAST_VERSION:6:2}"
              NEW_COUNTER=$((10#$LAST_COUNTER + 1))
              if [ $NEW_COUNTER -gt 99 ]; then
                echo "::error::Exceeded daily build limit (99)"
                exit 1
              fi
              NEW_COUNTER=$(printf "%02d" $NEW_COUNTER)
              NEW_VERSION_CODE="${DATE_PART}${NEW_COUNTER}"
              echo "::notice::Same day build - incrementing to $NEW_VERSION_CODE"
            else
              NEW_VERSION_CODE="${DATE_PART}01"
              echo "::notice::New day - resetting counter to $NEW_VERSION_CODE"
            fi
          fi
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_ENV
          sed -i "s/versionCode = .*/versionCode = $NEW_VERSION_CODE/" game/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${{ github.event.inputs.version_name }}\"/" game/build.gradle.kts
          echo "Updated build.gradle.kts:"
          grep -A2 "versionCode\|versionName" game/build.gradle.kts

      - name: Save version code for next run
        if: success()
        run: |
          echo "$NEW_VERSION_CODE" > version_code.txt
          echo "::notice::Version code $NEW_VERSION_CODE will be used for next build"

      - name: Upload version code artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: last-version-code
          path: version_code.txt
          retention-days: 365

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check ad mediation dependencies
        id: ad_check
        run: |
          echo "Checking ad mediation dependency resolution..."
          EXCLUDE=""
          # Try resolving dependencies and capture failures
          if ! ./gradlew :game:dependencies --configuration releaseRuntimeClasspath 2>&1 | tee /tmp/dep_output.txt | tail -5; then
            # Extract failed dependency groups (only ad mediation repos, not core deps)
            FAILED_GROUPS=$(grep -oP "Could not find \K[^:]+" /tmp/dep_output.txt | sort -u || true)
            for group in $FAILED_GROUPS; do
              # Only exclude ad-related groups (not google, firebase, androidx, etc.)
              case "$group" in
                com.google.*|com.firebase.*|androidx.*|org.jetbrains.*|com.appodeal.ads)
                  echo "::error::Core dependency unavailable: $group - cannot exclude"
                  exit 1
                  ;;
                *)
                  echo "::warning::Ad mediation dependency unavailable: $group"
                  EXCLUDE="${EXCLUDE:+$EXCLUDE,}$group"
                  ;;
              esac
            done
          fi
          echo "EXCLUDE_AD_GROUPS=$EXCLUDE" >> $GITHUB_ENV
          if [ -n "$EXCLUDE" ]; then
            echo "::warning::Will exclude unavailable ad groups: $EXCLUDE"
          else
            echo "All ad mediation dependencies resolved OK"
          fi

      - name: Build Release AAB
        env:
          KEYSTORE_FILE: ninemensmorris-upload-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: -Xmx8g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError
        run: |
          EXTRA_ARGS=""
          if [ -n "$EXCLUDE_AD_GROUPS" ]; then
            EXTRA_ARGS="-PexcludeAdGroups=$EXCLUDE_AD_GROUPS"
            echo "Building with excluded ad groups: $EXCLUDE_AD_GROUPS"
          fi
          ./gradlew :game:bundleRelease $EXTRA_ARGS --stacktrace --max-workers=1
          echo "Build completed! Checking outputs..."
          ls -lh game/build/outputs/bundle/release/

      - name: Ad mediation summary
        if: always()
        run: |
          echo "## Ad Mediation Summary" >> $GITHUB_STEP_SUMMARY
          if [ -n "$EXCLUDE_AD_GROUPS" ]; then
            echo "### Excluded (repository unavailable)" >> $GITHUB_STEP_SUMMARY
            IFS=',' read -ra GROUPS <<< "$EXCLUDE_AD_GROUPS"
            for g in "${GROUPS[@]}"; do
              echo "- \`$g\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_These ad networks were automatically excluded because their Maven repository was unreachable._" >> $GITHUB_STEP_SUMMARY
          else
            echo "All ad mediation dependencies resolved successfully." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify AAB signature
        run: |
          jarsigner -verify -verbose -certs game/build/outputs/bundle/release/game-release.aab

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ninemensmorris-release-v${{ github.event.inputs.version_name }}
          path: game/build/outputs/bundle/release/game-release.aab
          retention-days: 30

      - name: Upload mapping file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapping-file-v${{ github.event.inputs.version_name }}
          path: game/build/outputs/mapping/release/mapping.txt
          retention-days: 90

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            game/build/outputs/logs/
            game/build/reports/
          retention-days: 7

      - name: Cleanup keystore
        if: always()
        run: rm -f ninemensmorris-upload-key.jks

  deploy:
    name: Deploy to Play Console
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy == 'true' }}

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: ninemensmorris-release-v${{ github.event.inputs.version_name }}
          path: ./release

      - name: Upload to Play Console (Internal Testing)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.devfigas.ninemensmorris
          releaseFiles: ./release/game-release.aab
          track: internal
          status: completed
          changesNotSentForReview: true

      - name: Summary
        run: |
          echo "Deployed to Play Console - Internal Testing"
          echo "Version: ${{ github.event.inputs.version_name }}"
          echo "Check status: https://play.google.com/console"
